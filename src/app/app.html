<mat-toolbar color="primary">
  <span class="logo" routerLink="/destinos">
    <mat-icon>map</mat-icon>
    TuristMap
  </span>

  <span class="spacer"></span>

  <nav class="nav-links">
    <button mat-button routerLink="/destinos" routerLinkActive="active-link">
      <mat-icon>place</mat-icon> Destinos
    </button>
    <button mat-button routerLink="/actividades" routerLinkActive="active-link">
      <mat-icon>local_activity</mat-icon> Actividades
    </button>
    @if (estaLogueado) {
      <button mat-button routerLink="/itinerarios" routerLinkActive="active-link">
        <mat-icon>event_note</mat-icon> Itinerarios
      </button>
    }
  </nav>

  @if (!estaLogueado) {
    <button mat-button routerLink="/login">Iniciar sesión</button>
    <button mat-raised-button routerLink="/registro">Registrarse</button>
  }

  @if (estaLogueado) {
    <button mat-button [matMenuTriggerFor]="menu">
      <mat-icon>account_circle</mat-icon>
      {{ nombreUsuario }}
      <mat-icon>arrow_drop_down</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="cerrarSesion()">
        <mat-icon>logout</mat-icon> Cerrar sesión
      </button>
    </mat-menu>
  }
</mat-toolbar>

<main>
  <router-outlet></router-outlet>
</main>
